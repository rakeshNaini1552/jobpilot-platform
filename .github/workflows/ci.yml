name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobpilot
          POSTGRES_PASSWORD: jobpilot
          POSTGRES_DB: jobpilot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U jobpilot"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      JOBPILOT_DATABASE_URL: postgresql+psycopg://jobpilot:jobpilot@localhost:5432/jobpilot
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Migrate (real pgvector schema)
        run: alembic upgrade head
      - name: Lint
        run: |
          ruff check app tests
          lint-imports
      - name: Test
        run: pytest -q --cov=app --cov-report=term

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-fund --no-audit
      - name: Typecheck + build
        run: npm run build
      - name: Test
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config -q
      - name: Build images
        run: docker compose build
